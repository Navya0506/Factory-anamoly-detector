# telegraf.conf — Factory Floor Anomaly Detector
# ================================================
# Two jobs:
#   INPUT  → subscribe to MQTT topics, receive JSON messages
#   OUTPUT → write parsed data into InfluxDB
#
# Data flow:
#   Mosquitto → [this file] → InfluxDB

# ── Global agent settings ─────────────────────────────────────────────────────
[agent]
  interval         = "1s"    # how often Telegraf collects/flushes data
  flush_interval   = "5s"    # how often it writes batch to InfluxDB
  omit_hostname    = true    # we don't need the container hostname in data

# ─────────────────────────────────────────────────────────────────────────────
#  INPUT — MQTT Consumer
#  Subscribes to your MQTT topics and receives every message
# ─────────────────────────────────────────────────────────────────────────────
[[inputs.mqtt_consumer]]

  # Where is the broker? Uses Docker service name — same as publisher
  servers = ["tcp://mosquitto:1883"]

  # Which topics to subscribe to — # means wildcard (everything under factory/)
  topics = [
    "factory/sensor/raw",
    "factory/alert/primary"
  ]

  # Tell Telegraf the topic itself tells us what measurement to store
  # factory/sensor/raw    → stored as measurement "sensor"
  # factory/alert/primary → stored as measurement "alert"
  topic_tag = ""

  # Each MQTT message is one JSON object
  data_format = "json"

  # Use the timestamp FROM the message (your publisher sets this)
  # instead of the time Telegraf received it
  json_time_key    = "timestamp"
  json_time_format = "unix"

  # ── Sensor topic specific settings ──
  # Tell Telegraf: when message arrives on factory/sensor/raw
  # store it under measurement name "factory_sensor"
[[inputs.mqtt_consumer.topic_parsing]]
    topic = "factory/sensor/raw"
    measurement = "_/measurement/_"
    tags = "_/_/_"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "factory/alert/primary"
    measurement = "_/measurement/_"
    tags = "_/_/_"
# ─────────────────────────────────────────────────────────────────────────────
#  JSON STRING FIELDS → TAGS
#  By default Telegraf stores all JSON values as fields.
#  We need to tell it which string values should be tags instead.
#
#  Rule we defined:
#    TAG   = category/filter value  (machine_type, overall_state, failure_type)
#    FIELD = number to measure      (rpm, torque, early_warning, actual_failure)
# ─────────────────────────────────────────────────────────────────────────────
[[processors.converter]]
  [processors.converter.tags]
    # These string fields become tags (indexed, filterable in Grafana)
    string = [
      "machine_type",
      "overall_state",
      "failure_type",
      "state"
    ]

# ─────────────────────────────────────────────────────────────────────────────
#  OUTPUT — InfluxDB v2
#  Writes all received and parsed data into InfluxDB
# ─────────────────────────────────────────────────────────────────────────────
[[outputs.influxdb_v2]]

  # Where is InfluxDB? Uses Docker service name
  urls = ["http://influxdb:8086"]

  # These match the environment variables set in docker-compose.yml
  token        = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket       = "${INFLUX_BUCKET}"

  # If InfluxDB is temporarily unavailable, retry instead of dropping data
  timeout = "5s"