# dashboard.yml
# =============
# Tells Grafana WHERE to find dashboard JSON files
# Grafana will scan the /dashboards folder and load everything it finds

apiVersion: 1

providers:
  - name: factory-dashboards
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards
