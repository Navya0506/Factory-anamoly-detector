

services:

  # ── 1. MQTT Broker ───────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped
    networks:
      - factory_net

  # ── 2. Python Publisher ──────────────────────
  publisher:
    build: ./publisher
    container_name: publisher
    depends_on:
      - mosquitto
    volumes:
      - ./data:/data:ro
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      DATA_PATH: /data/ai4i2020.csv
      REPLAY_DELAY: "1.0"
    restart: unless-stopped
    networks:
      - factory_net

  # ── 3. InfluxDB ──────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE:        setup
      DOCKER_INFLUXDB_INIT_USERNAME:    admin
      DOCKER_INFLUXDB_INIT_PASSWORD:    adminpassword123
      DOCKER_INFLUXDB_INIT_ORG:         factory
      DOCKER_INFLUXDB_INIT_BUCKET:      sensor_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: factory-super-secret-token
    restart: unless-stopped
    networks:
      - factory_net

  # ── 4. Telegraf ──────────────────────────────
  telegraf:
    image: telegraf:1.29
    container_name: telegraf
    depends_on:
      - mosquitto
      - influxdb
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
    environment:
      INFLUX_TOKEN:  factory-super-secret-token
      INFLUX_ORG:    factory
      INFLUX_BUCKET: sensor_data
    restart: unless-stopped
    networks:
      - factory_net

  # ── 5. Grafana ───────────────────────────────
 
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_AUTH_ANONYMOUS_ENABLED:  "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/factory.json
    restart: unless-stopped
    networks:
      - factory_net

volumes:
  mosquitto_data:
  influxdb_data:
  grafana_data:

networks:
  factory_net:
    driver: bridge